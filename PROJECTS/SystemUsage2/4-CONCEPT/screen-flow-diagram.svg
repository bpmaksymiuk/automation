<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1000" height="620" fill="#161b22"/>
  <rect x="0" y="0" width="1000" height="48" fill="#21262d"/>
  <text x="20" y="31" fill="#e8902a" font-size="20">The Boiler Room — Screen Flow Diagram</text>

  <rect x="370" y="90" width="260" height="100" rx="8" fill="#2a2622" stroke="#b68a4e" stroke-width="2"/>
  <text x="500" y="125" fill="#e8902a" font-size="18" text-anchor="middle">BOILER ROOM</text>
  <text x="500" y="150" fill="#dce6ea" font-size="12" text-anchor="middle">main, single-page, non-scrolling</text>
  <text x="500" y="170" fill="#9c8f7e" font-size="11" text-anchor="middle">CPU · GPU · RAM · DISK · NET · ⚙</text>

  <rect x="60" y="100" width="200" height="80" rx="8" fill="#1b2430" stroke="#3fb4c4" stroke-width="2"/>
  <text x="160" y="135" fill="#3fb4c4" font-size="14" text-anchor="middle">LOCAL AGENT</text>
  <text x="160" y="156" fill="#dce6ea" font-size="11" text-anchor="middle">SSE / JSON · psutil</text>
  <line x1="260" y1="140" x2="370" y2="140" stroke="#3fb4c4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="315" y="130" fill="#9c8f7e" font-size="10" text-anchor="middle">live data</text>

  <rect x="60" y="210" width="200" height="64" rx="8" fill="#1b2430" stroke="#9c8f7e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="160" y="238" fill="#9c8f7e" font-size="13" text-anchor="middle">DEMO MODE</text>
  <text x="160" y="257" fill="#9c8f7e" font-size="10" text-anchor="middle">if no agent reachable</text>
  <line x1="160" y1="210" x2="160" y2="180" stroke="#9c8f7e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <rect x="120" y="360" width="220" height="90" rx="8" fill="#2a2622" stroke="#b68a4e" stroke-width="1.5"/>
  <text x="230" y="392" fill="#e8902a" font-size="15" text-anchor="middle">Process Inspector</text>
  <text x="230" y="414" fill="#dce6ea" font-size="11" text-anchor="middle">inline accordion in panel</text>
  <text x="230" y="432" fill="#9c8f7e" font-size="10" text-anchor="middle">click a process row</text>

  <rect x="390" y="360" width="220" height="90" rx="8" fill="#2a2622" stroke="#b68a4e" stroke-width="1.5"/>
  <text x="500" y="392" fill="#e8902a" font-size="15" text-anchor="middle">History Modal</text>
  <text x="500" y="414" fill="#dce6ea" font-size="11" text-anchor="middle">30-min line graph overlay</text>
  <text x="500" y="432" fill="#9c8f7e" font-size="10" text-anchor="middle">click a gauge label</text>

  <rect x="660" y="360" width="220" height="90" rx="8" fill="#2a2622" stroke="#b68a4e" stroke-width="1.5"/>
  <text x="770" y="392" fill="#e8902a" font-size="15" text-anchor="middle">Alert Control Drawer</text>
  <text x="770" y="414" fill="#dce6ea" font-size="11" text-anchor="middle">threshold valves + toggles</text>
  <text x="770" y="432" fill="#9c8f7e" font-size="10" text-anchor="middle">click ⚙</text>

  <line x1="430" y1="190" x2="230" y2="360" stroke="#b68a4e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="190" x2="500" y2="360" stroke="#b68a4e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="190" x2="770" y2="360" stroke="#b68a4e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="500" y="500" fill="#9c8f7e" font-size="11" text-anchor="middle">All overlays animate over the live room and return to it — no screen is a dead end.</text>

  <rect x="370" y="530" width="260" height="60" rx="8" fill="#1b2430" stroke="#3fb4c4" stroke-width="1.5"/>
  <text x="500" y="556" fill="#3fb4c4" font-size="13" text-anchor="middle">Responsive reflow ≤768px</text>
  <text x="500" y="576" fill="#9c8f7e" font-size="10" text-anchor="middle">panels stack vertically (same data)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#b68a4e"/>
    </marker>
  </defs>
</svg>