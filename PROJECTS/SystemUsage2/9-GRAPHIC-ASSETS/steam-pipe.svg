<svg xmlns="http://www.w3.org/2000/svg" width="420" height="200" viewBox="0 0 420 200" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d488"/>
      <stop offset="50%" stop-color="#a8780f"/>
      <stop offset="100%" stop-color="#5c4109"/>
    </linearGradient>
    <linearGradient id="steam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#cde9ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#79c0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="420" height="200" fill="#0d1117"/>
  <rect x="20" y="80" width="380" height="40" rx="20" fill="url(#pipe)" stroke="#3d2a06" stroke-width="2"/>
  <rect x="120" y="72" width="14" height="56" rx="4" fill="#c8941f" stroke="#3d2a06"/>
  <rect x="290" y="72" width="14" height="56" rx="4" fill="#c8941f" stroke="#3d2a06"/>
  <g id="steam-flow">
    <ellipse cx="120" cy="100" rx="40" ry="10" fill="url(#steam)"/>
    <ellipse cx="220" cy="100" rx="55" ry="11" fill="url(#steam)"/>
    <ellipse cx="320" cy="100" rx="40" ry="9" fill="url(#steam)"/>
  </g>
  <text x="210" y="50" fill="#79c0ff" font-size="13" text-anchor="middle">down (rx)   up (tx)</text>
  <text x="210" y="160" fill="#d29922" font-size="13" text-anchor="middle" letter-spacing="2">STEAM PIPE - NETWORK</text>
</svg>
