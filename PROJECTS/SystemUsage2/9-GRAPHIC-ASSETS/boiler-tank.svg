<svg xmlns="http://www.w3.org/2000/svg" width="240" height="340" viewBox="0 0 240 340" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2b333d"/>
      <stop offset="50%" stop-color="#3d444d"/>
      <stop offset="100%" stop-color="#1b2027"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58c0ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="brassRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d488"/>
      <stop offset="100%" stop-color="#8a6314"/>
    </linearGradient>
  </defs>
  <rect x="40" y="14" width="160" height="26" rx="8" fill="url(#brassRim)" stroke="#3d2a06"/>
  <rect x="60" y="40" width="120" height="260" rx="14" fill="url(#glass)" stroke="#3d2a06" stroke-width="3"/>
