    <g fill="#cde9ff" opacity="0.85">
      <circle cx="92" cy="250" r="5"/><circle cx="120" cy="225" r="7"/>
      <circle cx="150" cy="260" r="4"/><circle cx="108" cy="278" r="6"/>
      <circle cx="135" cy="200" r="5"/>
