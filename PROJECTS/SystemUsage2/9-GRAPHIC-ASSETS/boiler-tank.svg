  </g>
  <rect x="40" y="300" width="160" height="26" rx="8" fill="url(#brassRim)" stroke="#3d2a06"/>
  <g stroke="#8b949e" stroke-width="2">
    <line x1="180" y1="70" x2="192" y2="70"/><line x1="180" y1="125" x2="192" y2="125"/>
    <line x1="180" y1="180" x2="192" y2="180"/><line x1="180" y1="235" x2="192" y2="235"/>
  </g>
  <text x="120" y="330" fill="#d29922" font-size="12" text-anchor="middle" letter-spacing="2" dy="-2">BOILER</text>
