<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="1000" height="560" fill="#0d1117"/>
  <rect x="0" y="0" width="1000" height="46" fill="#161b22"/>
  <text x="20" y="30" fill="#d29922" font-size="20">The Boiler Room - Data Flow Diagram</text>

  <rect x="40" y="100" width="180" height="120" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="2"/>
  <text x="130" y="150" fill="#e6edf3" font-size="15" text-anchor="middle">Operating System</text>
  <text x="130" y="174" fill="#8b949e" font-size="11" text-anchor="middle">/proc - sysfs</text>
  <text x="130" y="192" fill="#8b949e" font-size="11" text-anchor="middle">nvidia-smi</text>

  <rect x="300" y="80" width="240" height="200" rx="8" fill="#161b22" stroke="#f78166" stroke-width="2"/>
  <text x="420" y="108" fill="#f78166" font-size="15" text-anchor="middle">Metrics Agent (agent.py)</text>
  <rect x="320" y="124" width="200" height="44" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="420" y="151" fill="#e6edf3" font-size="12" text-anchor="middle">collect_snapshot() - psutil</text>
  <rect x="320" y="176" width="200" height="40" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="420" y="201" fill="#e6edf3" font-size="12" text-anchor="middle">ThreadingHTTPServer</text>
  <rect x="320" y="224" width="200" height="40" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="420" y="249" fill="#79c0ff" font-size="11" text-anchor="middle">/  /api/metrics  /api/stream</text>

  <rect x="640" y="70" width="320" height="300" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <text x="800" y="98" fill="#79c0ff" font-size="15" text-anchor="middle">Client (index.html)</text>
  <rect x="660" y="112" width="280" height="38" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="800" y="136" fill="#e6edf3" font-size="11" text-anchor="middle">DataSource: SSE -> poll -> demo</text>
  <rect x="660" y="158" width="280" height="38" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="800" y="182" fill="#e6edf3" font-size="11" text-anchor="middle">renderSnapshot() -> panels</text>
  <rect x="660" y="204" width="280" height="38" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="800" y="228" fill="#e6edf3" font-size="11" text-anchor="middle">Animation loop (Canvas 2D)</text>
  <rect x="660" y="250" width="280" height="38" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="800" y="274" fill="#e6edf3" font-size="11" text-anchor="middle">evaluateAlerts() -> lamps/alarms</text>
  <rect x="660" y="296" width="280" height="38" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="800" y="320" fill="#d29922" font-size="11" text-anchor="middle">localStorage: thresholds, motion</text>

  <rect x="640" y="400" width="200" height="64" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="740" y="428" fill="#8b949e" font-size="12" text-anchor="middle">DemoSimulator</text>
  <text x="740" y="448" fill="#8b949e" font-size="10" text-anchor="middle">used when no agent</text>

  <rect x="870" y="400" width="110" height="64" rx="8" fill="#161b22" stroke="#2ea043" stroke-width="1.5"/>
  <text x="925" y="428" fill="#3fb950" font-size="11" text-anchor="middle">Notification</text>
  <text x="925" y="446" fill="#8b949e" font-size="10" text-anchor="middle">+ webhook</text>

  <line x1="220" y1="160" x2="300" y2="160" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <text x="260" y="150" fill="#8b949e" font-size="10" text-anchor="middle">read</text>
  <line x1="540" y1="170" x2="660" y2="150" stroke="#79c0ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="600" y="150" fill="#8b949e" font-size="10" text-anchor="middle">JSON / SSE</text>
  <line x1="740" y1="400" x2="760" y2="334" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <line x1="900" y1="400" x2="880" y2="334" stroke="#2ea043" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="500" y="520" fill="#8b949e" font-size="11" text-anchor="middle">All data is read-only. Agent binds 127.0.0.1 by default. No secrets in client.</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
