<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="1000" height="520" fill="#0d1117"/>
  <text x="20" y="32" fill="#d29922" font-size="18">Sequence - Live Update (UC-002 / BR-003)</text>

  <g fill="#161b22" stroke="#3d444d">
    <rect x="60" y="60" width="150" height="40" rx="6"/>
    <rect x="290" y="60" width="170" height="40" rx="6"/>
    <rect x="540" y="60" width="170" height="40" rx="6"/>
    <rect x="790" y="60" width="160" height="40" rx="6"/>
  </g>
  <text x="135" y="85" fill="#e6edf3" font-size="12" text-anchor="middle">OS / psutil</text>
  <text x="375" y="85" fill="#f78166" font-size="12" text-anchor="middle">Agent</text>
  <text x="625" y="85" fill="#79c0ff" font-size="12" text-anchor="middle">DataSource</text>
  <text x="870" y="85" fill="#79c0ff" font-size="12" text-anchor="middle">Panels</text>
  <g stroke="#21262d" stroke-width="2">
    <line x1="135" y1="100" x2="135" y2="480"/>
    <line x1="375" y1="100" x2="375" y2="480"/>
    <line x1="625" y1="100" x2="625" y2="480"/>
    <line x1="870" y1="100" x2="870" y2="480"/>
  </g>

  <line x1="625" y1="140" x2="375" y2="140" stroke="#79c0ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="500" y="132" fill="#8b949e" font-size="11" text-anchor="middle">open EventSource /api/stream</text>

  <line x1="375" y1="190" x2="135" y2="190" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <text x="255" y="182" fill="#8b949e" font-size="11" text-anchor="middle">collect_snapshot()</text>
  <line x1="135" y1="230" x2="375" y2="230" stroke="#8b949e" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="255" y="222" fill="#8b949e" font-size="11" text-anchor="middle">metrics</text>

  <line x1="375" y1="275" x2="625" y2="275" stroke="#f78166" stroke-width="2" marker-end="url(#a)"/>
  <text x="500" y="267" fill="#8b949e" font-size="11" text-anchor="middle">data: {snapshot}  (every ~1s)</text>

  <line x1="625" y1="320" x2="870" y2="320" stroke="#79c0ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="748" y="312" fill="#8b949e" font-size="11" text-anchor="middle">onSnapshot -> renderSnapshot()</text>

  <rect x="820" y="345" width="100" height="36" rx="6" fill="#1b2027" stroke="#2ea043"/>
  <text x="870" y="368" fill="#3fb950" font-size="11" text-anchor="middle">conn=live</text>

  <rect x="340" y="250" width="560" height="150" rx="6" fill="none" stroke="#d29922" stroke-dasharray="6 4"/>
  <text x="360" y="245" fill="#d29922" font-size="11">loop: <= 2s</text>

  <text x="500" y="450" fill="#8b949e" font-size="11" text-anchor="middle">On SSE error -> DataSource falls back to polling /api/metrics, then to DemoSimulator (conn=demo).</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
