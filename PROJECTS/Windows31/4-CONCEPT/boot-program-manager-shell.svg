<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Boot and Desktop Shell Concept</title>
  <desc id="desc">A dark storyboard showing the boot splash, desktop landing, and Program Manager-style shell structure.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <rect x="55" y="55" width="1490" height="790" rx="18" fill="#161b22" stroke="#3d444d" stroke-width="3"/>
  <rect x="55" y="55" width="1490" height="54" fill="#202734" stroke="#3d444d" stroke-width="3"/>
  <text x="85" y="90" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700">Boot and Desktop Shell</text>

  <rect x="90" y="150" width="370" height="620" rx="18" fill="#0f1720" stroke="#58a6ff" stroke-width="3"/>
  <rect x="520" y="150" width="990" height="620" rx="18" fill="#101824" stroke="#3fb950" stroke-width="3"/>

  <rect x="135" y="195" width="280" height="140" rx="16" fill="#1f2937" stroke="#8b949e" stroke-width="2"/>
  <text x="275" y="245" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Boot Splash</text>
  <text x="275" y="280" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="16" text-anchor="middle">skip or wait to enter</text>
  <text x="275" y="312" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="14" text-anchor="middle">UC-001</text>

  <rect x="135" y="370" width="280" height="320" rx="16" fill="#171f2b" stroke="#8b949e" stroke-width="2"/>
  <text x="275" y="405" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Program Groups</text>
  <rect x="170" y="438" width="90" height="70" rx="10" fill="#1f6feb"/>
  <rect x="275" y="438" width="90" height="70" rx="10" fill="#f78166"/>
  <rect x="170" y="528" width="90" height="70" rx="10" fill="#3fb950"/>
  <rect x="275" y="528" width="90" height="70" rx="10" fill="#d29922"/>
  <text x="215" y="480" fill="#ffffff" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">Notepad</text>
  <text x="320" y="480" fill="#ffffff" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">Paint</text>
  <text x="215" y="570" fill="#ffffff" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">Calc</text>
  <text x="320" y="570" fill="#ffffff" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">Mines</text>
  <text x="275" y="648" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="14" text-anchor="middle">double-click to launch</text>

  <rect x="565" y="185" width="900" height="540" rx="14" fill="#0d1117" stroke="#8b949e" stroke-width="2"/>
  <rect x="565" y="185" width="900" height="46" fill="#202734" stroke="#8b949e" stroke-width="2"/>
  <text x="594" y="215" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">Desktop</text>
  <rect x="595" y="255" width="190" height="150" rx="14" fill="#111827" stroke="#58a6ff" stroke-width="2"/>
  <rect x="810" y="255" width="190" height="150" rx="14" fill="#111827" stroke="#58a6ff" stroke-width="2"/>
  <rect x="1025" y="255" width="190" height="150" rx="14" fill="#111827" stroke="#58a6ff" stroke-width="2"/>
  <rect x="1240" y="255" width="190" height="150" rx="14" fill="#111827" stroke="#58a6ff" stroke-width="2"/>
  <text x="690" y="338" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">File</text>
  <text x="905" y="338" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Control</text>
  <text x="1120" y="338" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Accessories</text>
  <text x="1335" y="338" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">Games</text>
  <text x="690" y="372" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="14" text-anchor="middle">shell surface</text>
  <text x="905" y="372" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="14" text-anchor="middle">window chrome</text>
  <text x="1120" y="372" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="14" text-anchor="middle">app group</text>
  <text x="1335" y="372" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="14" text-anchor="middle">launch path</text>

  <rect x="595" y="455" width="835" height="210" rx="12" fill="#111827" stroke="#3fb950" stroke-width="2"/>
  <text x="1023" y="500" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Shell rules</text>
  <text x="1023" y="535" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="16" text-anchor="middle">Icons open windows. Windows close back to the desktop.</text>
  <text x="1023" y="565" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="16" text-anchor="middle">The shell is the world, not a page decoration.</text>
  <text x="1023" y="595" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="16" text-anchor="middle">UC-001, UC-002</text>
</svg>
