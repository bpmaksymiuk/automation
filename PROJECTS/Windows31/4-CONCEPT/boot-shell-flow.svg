<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Boot and Shell Storyboard</title>
  <desc id="desc">Storyboard showing the boot splash, desktop shell, icon groups, and responsive control hints.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <rect x="0" y="0" width="1600" height="72" fill="#161b22"/>
  <text x="36" y="44" fill="#e6edf3" font-family="Arial, sans-serif" font-size="28" font-weight="700">Boot and Shell Layout</text>
  <text x="36" y="62" fill="#8b949e" font-family="Arial, sans-serif" font-size="14">Entry ritual, desktop grouping, and touch-friendly fallback behavior</text>

  <rect x="70" y="130" width="420" height="610" rx="16" fill="#111827" stroke="#4f6d7a" stroke-width="3"/>
  <rect x="70" y="130" width="420" height="46" rx="16" fill="#1f2937"/>
  <text x="92" y="160" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Boot Splash</text>
  <rect x="110" y="210" width="340" height="220" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="148" y="286" fill="#d1d5db" font-family="Arial, sans-serif" font-size="30" font-weight="700">Windows 3.1</text>
  <text x="148" y="328" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">Loading classic shell...</text>
  <rect x="150" y="372" width="260" height="18" rx="9" fill="#1f2937"/>
  <rect x="150" y="372" width="160" height="18" rx="9" fill="#4f6d7a"/>
  <text x="110" y="478" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Skip path, replay path, or linger for atmosphere</text>

  <rect x="560" y="130" width="420" height="610" rx="16" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <rect x="560" y="130" width="420" height="46" rx="16" fill="#1f2937"/>
  <text x="582" y="160" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Desktop Shell</text>
  <rect x="600" y="208" width="150" height="120" rx="12" fill="#1e293b" stroke="#475569"/>
  <rect x="600" y="208" width="150" height="28" rx="12" fill="#334155"/>
  <text x="615" y="228" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="15" font-weight="700">Accessories</text>
  <text x="615" y="266" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14">Notepad</text>
  <text x="615" y="288" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14">Paint</text>

  <rect x="780" y="208" width="150" height="120" rx="12" fill="#1e293b" stroke="#475569"/>
  <rect x="780" y="208" width="150" height="28" rx="12" fill="#334155"/>
  <text x="795" y="228" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="15" font-weight="700">Games</text>
  <text x="795" y="266" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14">Minesweeper</text>
  <text x="795" y="288" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="14">Calculator</text>

  <rect x="600" y="370" width="330" height="190" rx="12" fill="#0f172a" stroke="#4f6d7a"/>
  <text x="622" y="408" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Primary desktop row</text>
  <text x="622" y="442" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Visible icons, double-click launch, drag-to-organize</text>
  <text x="622" y="474" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">The shell should feel like a room, not a web page</text>
  <text x="622" y="506" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Mobile mode enlarges the same touch targets</text>

  <rect x="1000" y="130" width="530" height="610" rx="16" fill="#111827" stroke="#4f6d7a" stroke-width="3"/>
  <rect x="1000" y="130" width="530" height="46" rx="16" fill="#1f2937"/>
  <text x="1022" y="160" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Responsive Controls</text>
  <rect x="1040" y="208" width="450" height="120" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="1064" y="244" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18" font-weight="700">Touch fallback</text>
  <text x="1064" y="276" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Bigger hit areas, simplified window controls, no mouse required</text>
  <rect x="1040" y="364" width="450" height="120" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="1064" y="400" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18" font-weight="700">Window chrome</text>
  <text x="1064" y="432" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Minimize, close, restore, and focus states must stay obvious</text>
  <rect x="1040" y="520" width="450" height="120" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="1064" y="556" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18" font-weight="700">System tone</text>
  <text x="1064" y="588" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Classic and recognizable, but never hostile to the user</text>
</svg>
