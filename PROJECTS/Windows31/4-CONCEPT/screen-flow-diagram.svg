<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Windows 3.1 Web Desktop Screen Flow Diagram</title>
  <desc id="desc">Flow diagram showing boot, desktop shell, bundled apps, hidden easter egg, and mobile-friendly shell behavior.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <rect x="0" y="0" width="1600" height="72" fill="#161b22"/>
  <text x="36" y="44" fill="#e6edf3" font-family="Arial, sans-serif" font-size="28" font-weight="700">Windows 3.1 Web Desktop - Screen Flow</text>
  <text x="36" y="62" fill="#8b949e" font-family="Arial, sans-serif" font-size="14">Boot sequence, desktop shell, bundled apps, hidden easter egg, and touch-friendly adaptation</text>

  <rect x="60" y="170" width="250" height="150" rx="14" fill="#111827" stroke="#4f6d7a" stroke-width="3"/>
  <text x="84" y="210" fill="#d1d5db" font-family="Arial, sans-serif" font-size="22" font-weight="700">Boot Splash</text>
  <text x="84" y="242" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Skip or linger</text>
  <text x="84" y="268" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Sets the era</text>

  <rect x="390" y="150" width="330" height="190" rx="14" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <text x="414" y="192" fill="#d1d5db" font-family="Arial, sans-serif" font-size="22" font-weight="700">Desktop Shell</text>
  <text x="414" y="224" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Program Manager-style layout</text>
  <text x="414" y="250" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Icons, groups, windows</text>
  <text x="414" y="276" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Touch-friendly alternate controls</text>

  <rect x="860" y="118" width="310" height="120" rx="14" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <text x="884" y="158" fill="#d1d5db" font-family="Arial, sans-serif" font-size="22" font-weight="700">Classic Apps</text>
  <text x="884" y="188" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Notepad, Paint, Calculator, Minesweeper</text>

  <rect x="860" y="285" width="310" height="120" rx="14" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <text x="884" y="325" fill="#d1d5db" font-family="Arial, sans-serif" font-size="22" font-weight="700">Hidden Room</text>
  <text x="884" y="355" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Secret icon or key path</text>

  <rect x="860" y="452" width="310" height="120" rx="14" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <text x="884" y="492" fill="#d1d5db" font-family="Arial, sans-serif" font-size="22" font-weight="700">Return to Shell</text>
  <text x="884" y="522" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Normal desktop flow resumes</text>

  <rect x="1160" y="150" width="360" height="190" rx="14" fill="#111827" stroke="#4f6d7a" stroke-width="3"/>
  <text x="1184" y="192" fill="#d1d5db" font-family="Arial, sans-serif" font-size="22" font-weight="700">Mobile Behavior</text>
  <text x="1184" y="224" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Larger controls and reflow</text>
  <text x="1184" y="250" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">Same identity, compressed room</text>
  <text x="1184" y="276" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">No horizontal scrolling as primary mode</text>

  <line x1="310" y1="245" x2="390" y2="245" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <polygon points="390,245 374,236 374,254" fill="#9ca3af"/>

  <line x1="720" y1="210" x2="860" y2="178" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <polygon points="860,178 842,173 846,191" fill="#9ca3af"/>

  <line x1="1015" y1="238" x2="1015" y2="285" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <polygon points="1015,285 1006,267 1024,267" fill="#9ca3af"/>

  <line x1="1015" y1="405" x2="1015" y2="452" stroke="#9ca3af" stroke-width="5" stroke-linecap="round"/>
  <polygon points="1015,452 1006,434 1024,434" fill="#9ca3af"/>

  <line x1="800" y1="246" x2="1160" y2="246" stroke="#9ca3af" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 10"/>
  <polygon points="1160,246 1143,237 1143,255" fill="#9ca3af"/>

  <rect x="60" y="690" width="1460" height="120" rx="18" fill="#111827" stroke="#30363d" stroke-width="2"/>
  <text x="88" y="730" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18" font-weight="700">Flow notes</text>
  <text x="88" y="760" fill="#9ca3af" font-family="Arial, sans-serif" font-size="16">The shell is the hub; apps are accessible from visible icons; the easter egg stays optional; mobile keeps the same visual language with larger targets.</text>
</svg>
