<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mobile Touch Shell Concept</title>
  <desc id="desc">A dark storyboard showing how the retro desktop compresses onto a mobile screen with larger touch targets and stacked windows.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <rect x="48" y="48" width="1504" height="804" rx="18" fill="#161b22" stroke="#3d444d" stroke-width="3"/>
  <rect x="48" y="48" width="1504" height="52" fill="#202734" stroke="#3d444d" stroke-width="3"/>
  <text x="80" y="82" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700">Mobile Touch Shell</text>

  <rect x="110" y="150" width="430" height="620" rx="32" fill="#111827" stroke="#58a6ff" stroke-width="3"/>
  <rect x="150" y="190" width="350" height="520" rx="18" fill="#0d1117" stroke="#8b949e" stroke-width="2"/>
  <rect x="150" y="190" width="350" height="54" rx="18" fill="#202734" stroke="#8b949e" stroke-width="2"/>
  <text x="185" y="224" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">Desktop on mobile</text>
  <rect x="170" y="265" width="150" height="110" rx="16" fill="#1f2937"/>
  <rect x="330" y="265" width="150" height="110" rx="16" fill="#1f2937"/>
  <rect x="170" y="390" width="150" height="110" rx="16" fill="#1f2937"/>
  <rect x="330" y="390" width="150" height="110" rx="16" fill="#1f2937"/>
  <rect x="170" y="515" width="310" height="110" rx="16" fill="#1f2937"/>
  <text x="245" y="330" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">Icon</text>
  <text x="405" y="330" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">Icon</text>
  <text x="245" y="455" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">Icon</text>
  <text x="405" y="455" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">Icon</text>
  <text x="325" y="579" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">Touch target row</text>
  <text x="325" y="672" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">UC-007</text>

  <rect x="620" y="175" width="390" height="300" rx="18" fill="#111827" stroke="#3fb950" stroke-width="3"/>
  <rect x="620" y="175" width="390" height="46" rx="18" fill="#202734" stroke="#3fb950" stroke-width="3"/>
  <text x="655" y="205" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">Touch Controls</text>
  <rect x="655" y="250" width="320" height="48" rx="12" fill="#30363d"/>
  <text x="815" y="281" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">larger hit targets</text>
  <rect x="655" y="315" width="320" height="48" rx="12" fill="#30363d"/>
  <text x="815" y="346" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">tap to launch and close</text>
  <rect x="655" y="380" width="320" height="48" rx="12" fill="#30363d"/>
  <text x="815" y="411" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">drag when it matters</text>

  <rect x="1065" y="165" width="420" height="610" rx="18" fill="#101824" stroke="#f78166" stroke-width="3"/>
  <rect x="1095" y="210" width="360" height="130" rx="14" fill="#0d1117" stroke="#8b949e" stroke-width="2"/>
  <text x="1275" y="252" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Stacked windows</text>
  <text x="1275" y="284" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">fit the screen without losing the shell identity</text>
  <rect x="1110" y="380" width="150" height="150" rx="14" fill="#111827" stroke="#58a6ff" stroke-width="2"/>
  <rect x="1285" y="380" width="150" height="150" rx="14" fill="#111827" stroke="#3fb950" stroke-width="2"/>
  <rect x="1197" y="555" width="150" height="150" rx="14" fill="#111827" stroke="#f78166" stroke-width="2"/>
  <text x="1185" y="465" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="17" text-anchor="middle">app</text>
  <text x="1360" y="465" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="17" text-anchor="middle">app</text>
  <text x="1272" y="640" fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="17" text-anchor="middle">app</text>
  <text x="1275" y="735" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">The same room, compressed to touch.</text>
</svg>
