<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Classic App Windows Concept</title>
  <desc id="desc">A dark storyboard showing Notepad, Paint, and Calculator as overlapping retro application windows.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <rect x="50" y="50" width="1500" height="800" rx="18" fill="#161b22" stroke="#3d444d" stroke-width="3"/>
  <rect x="50" y="50" width="1500" height="52" fill="#202734" stroke="#3d444d" stroke-width="3"/>
  <text x="82" y="84" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700">Classic App Windows</text>

  <g>
    <rect x="120" y="170" width="470" height="560" rx="16" fill="#111827" stroke="#58a6ff" stroke-width="3"/>
    <rect x="120" y="170" width="470" height="46" rx="16" fill="#202734" stroke="#58a6ff" stroke-width="3"/>
    <text x="155" y="200" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">Notepad</text>
    <rect x="150" y="245" width="410" height="430" rx="10" fill="#f0f6fc"/>
    <text x="170" y="280" fill="#000000" font-family="monospace" font-size="18">plain text</text>
    <text x="170" y="310" fill="#000000" font-family="monospace" font-size="18">simple editing</text>
    <text x="170" y="340" fill="#000000" font-family="monospace" font-size="18">cursor, select, type</text>
    <text x="170" y="390" fill="#000000" font-family="monospace" font-size="18">&gt; hello world</text>
  </g>

  <g>
    <rect x="610" y="215" width="420" height="510" rx="16" fill="#111827" stroke="#3fb950" stroke-width="3"/>
    <rect x="610" y="215" width="420" height="46" rx="16" fill="#202734" stroke="#3fb950" stroke-width="3"/>
    <text x="645" y="245" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">Paint</text>
    <rect x="640" y="280" width="360" height="400" rx="10" fill="#0f1720" stroke="#8b949e" stroke-width="2"/>
    <circle cx="710" cy="355" r="20" fill="#f78166"/>
    <circle cx="770" cy="355" r="20" fill="#d29922"/>
    <circle cx="830" cy="355" r="20" fill="#3fb950"/>
    <path d="M690 575 C770 430, 820 640, 915 485" fill="none" stroke="#58a6ff" stroke-width="8" stroke-linecap="round"/>
    <text x="820" y="615" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">draw, recolor, revise</text>
  </g>

  <g>
    <rect x="1060" y="245" width="350" height="420" rx="16" fill="#111827" stroke="#f78166" stroke-width="3"/>
    <rect x="1060" y="245" width="350" height="46" rx="16" fill="#202734" stroke="#f78166" stroke-width="3"/>
    <text x="1095" y="275" fill="#f0f6fc" font-family="Verdana, Arial, sans-serif" font-size="18" font-weight="700">Calculator</text>
    <rect x="1090" y="315" width="290" height="300" rx="10" fill="#0f1720" stroke="#8b949e" stroke-width="2"/>
    <rect x="1120" y="345" width="230" height="56" rx="8" fill="#d0d7de"/>
    <text x="1235" y="382" fill="#000000" font-family="monospace" font-size="26" text-anchor="middle">0</text>
    <g fill="#c9d1d9" font-family="Verdana, Arial, sans-serif" font-size="18" text-anchor="middle">
      <rect x="1120" y="425" width="56" height="44" rx="8" fill="#30363d"/>
      <rect x="1186" y="425" width="56" height="44" rx="8" fill="#30363d"/>
      <rect x="1252" y="425" width="56" height="44" rx="8" fill="#30363d"/>
      <rect x="1318" y="425" width="56" height="44" rx="8" fill="#30363d"/>
      <text x="1148" y="454">7</text>
      <text x="1214" y="454">8</text>
      <text x="1280" y="454">9</text>
      <text x="1346" y="454">/</text>
    </g>
    <text x="1235" y="635" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">quick arithmetic</text>
  </g>

  <text x="800" y="780" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="16" text-anchor="middle">Each app window carries a distinct rhythm, but all of them share the same shell language.</text>
  <text x="800" y="810" fill="#8b949e" font-family="Verdana, Arial, sans-serif" font-size="15" text-anchor="middle">UC-002, UC-003, UC-004</text>
</svg>
