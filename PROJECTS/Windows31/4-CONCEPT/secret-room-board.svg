<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Secret Room Storyboard</title>
  <desc id="desc">Storyboard showing the hidden easter egg path, the secret room, and the return to the desktop shell.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <rect x="0" y="0" width="1600" height="72" fill="#161b22"/>
  <text x="36" y="44" fill="#e6edf3" font-family="Arial, sans-serif" font-size="28" font-weight="700">Secret Room and Easter Egg</text>
  <text x="36" y="62" fill="#8b949e" font-family="Arial, sans-serif" font-size="14">Hidden discovery path that stays optional and returns cleanly to the shell</text>

  <rect x="70" y="140" width="390" height="570" rx="16" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <rect x="70" y="140" width="390" height="44" rx="16" fill="#1f2937"/>
  <text x="92" y="168" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Hidden icon path</text>
  <circle cx="170" cy="280" r="58" fill="#0f172a" stroke="#4f6d7a" stroke-width="3"/>
  <text x="138" y="286" fill="#d1d5db" font-family="Arial, sans-serif" font-size="17">secret</text>
  <text x="116" y="344" fill="#9ca3af" font-family="Arial, sans-serif" font-size="15">an unusual icon sequence or chord</text>
  <rect x="120" y="392" width="240" height="72" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="146" y="434" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">discoverable, but not obvious</text>
  <text x="116" y="516" fill="#9ca3af" font-family="Arial, sans-serif" font-size="15">the shell should hint at mystery without</text>
  <text x="116" y="540" fill="#9ca3af" font-family="Arial, sans-serif" font-size="15">breaking the main desktop flow</text>

  <rect x="540" y="130" width="430" height="610" rx="16" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <rect x="540" y="130" width="430" height="44" rx="16" fill="#1f2937"/>
  <text x="562" y="158" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Secret room</text>
  <rect x="584" y="210" width="340" height="340" rx="18" fill="#101820" stroke="#a78bfa" stroke-width="3"/>
  <text x="622" y="260" fill="#f5f3ff" font-family="Arial, sans-serif" font-size="24" font-weight="700">After hours shell</text>
  <text x="622" y="300" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="16">same world, stranger lighting</text>
  <rect x="622" y="334" width="250" height="140" rx="14" fill="#161b22" stroke="#4f6d7a"/>
  <text x="646" y="372" fill="#d1d5db" font-family="monospace" font-size="20">alternate icons</text>
  <text x="646" y="404" fill="#d1d5db" font-family="monospace" font-size="20">strange sound cue</text>
  <text x="646" y="436" fill="#d1d5db" font-family="monospace" font-size="20">hidden message</text>
  <text x="584" y="592" fill="#9ca3af" font-family="Arial, sans-serif" font-size="15">The easter egg should feel playful, not punitive.</text>

  <rect x="1020" y="140" width="510" height="570" rx="16" fill="#111827" stroke="#6b7280" stroke-width="3"/>
  <rect x="1020" y="140" width="510" height="44" rx="16" fill="#1f2937"/>
  <text x="1042" y="168" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="18" font-weight="700">Return to desktop</text>
  <rect x="1070" y="220" width="410" height="210" rx="14" fill="#0f172a" stroke="#334155"/>
  <text x="1100" y="262" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18" font-weight="700">clear exit path</text>
  <text x="1100" y="296" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">dismiss the secret, restore the shell, keep exploring</text>
  <rect x="1100" y="340" width="160" height="48" rx="10" fill="#4f6d7a"/>
  <text x="1140" y="371" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="16" font-weight="700">Back</text>
  <rect x="1280" y="340" width="160" height="48" rx="10" fill="#374151"/>
  <text x="1323" y="371" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="16" font-weight="700">Close</text>
  <text x="1070" y="486" fill="#9ca3af" font-family="Arial, sans-serif" font-size="15">This board maps UC-006: the hidden detail should be visible, distinct, and safe to leave.</text>
</svg>
