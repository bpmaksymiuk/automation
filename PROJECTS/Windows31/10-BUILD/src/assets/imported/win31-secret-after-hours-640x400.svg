<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">After-hours secret backdrop</title>
  <desc id="desc">Moonlit after-hours reinterpretation of the desktop room used inside the secret overlay.</desc>
  <defs>
    <linearGradient id="night" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151734"/>
      <stop offset="0.55" stop-color="#1d234d"/>
      <stop offset="1" stop-color="#2c215a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d5d8ff"/>
      <stop offset="1" stop-color="#7ac4e5"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#night)"/>
  <circle cx="525" cy="72" r="34" fill="#f4f6ff" opacity="0.95"/>
  <circle cx="513" cy="64" r="34" fill="#a28dd9" opacity="0.18"/>
  <g fill="#ffffff" opacity="0.45">
    <circle cx="58" cy="48" r="1.6"/><circle cx="118" cy="88" r="1.2"/><circle cx="182" cy="42" r="1.4"/><circle cx="264" cy="76" r="1.3"/>
    <circle cx="348" cy="58" r="1.2"/><circle cx="406" cy="92" r="1.5"/><circle cx="596" cy="128" r="1.2"/>
  </g>
  <rect x="62" y="88" width="516" height="246" rx="10" fill="#d7d9ea" opacity="0.14" stroke="#98a0ff" stroke-width="2"/>
  <rect x="78" y="104" width="484" height="214" rx="8" fill="#0e1731" opacity="0.56" stroke="#c2cbff" stroke-width="1.5"/>
  <g transform="translate(116 136)">
    <rect width="128" height="108" rx="8" fill="#1b2b54" stroke="#7ac4e5" stroke-width="2"/>
    <rect x="0" y="0" width="128" height="22" rx="8" fill="#2b3d72"/>
    <text x="64" y="15" fill="#eef0ff" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">After Hours</text>
    <rect x="20" y="34" width="34" height="24" fill="#f5f7ff"/>
    <rect x="60" y="36" width="34" height="24" fill="#ffd983"/>
    <rect x="28" y="64" width="34" height="24" fill="#eb8a98"/>
    <rect x="68" y="68" width="34" height="24" fill="#78d0e2"/>
  </g>
  <g transform="translate(286 142)">
    <rect x="0" y="0" width="226" height="94" rx="10" fill="#111d39" stroke="#8e9cf7" stroke-width="2"/>
    <text x="18" y="28" fill="#edf0ff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">You found the after-hours room.</text>
    <text x="18" y="54" fill="#c6cffd" font-family="Segoe UI, Arial, sans-serif" font-size="14">The same little desktop is still awake, only quieter.</text>
    <text x="18" y="76" fill="#9edff4" font-family="Segoe UI, Arial, sans-serif" font-size="13">Look around, then head back when you are ready.</text>
  </g>
  <g transform="translate(320 266)">
    <rect x="0" y="0" width="166" height="30" rx="6" fill="url(#glow)" opacity="0.9"/>
    <text x="83" y="20" fill="#101426" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">same room, stranger lighting</text>
  </g>
</svg>
