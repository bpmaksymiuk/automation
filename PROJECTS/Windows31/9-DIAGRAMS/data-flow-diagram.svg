<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Windows 3.1 web desktop data flow diagram</title>
  <desc id="desc">Diagram showing actor, shell, app modules, static assets, text content, and browser APIs.</desc>
  <rect width="1600" height="980" fill="#0d1117"/>
  <text x="48" y="54" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Data Flow Diagram</text>
  <text x="48" y="80" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="15">Windows 3.1 web desktop — Stage 10 implementation view derived from Stages 2 through 8</text>

  <rect x="48" y="130" width="210" height="120" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="153" y="172" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Visitor</text>
  <text x="153" y="202" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">clicks, taps, types,</text>
  <text x="153" y="222" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">reads status, triggers secret</text>

  <rect x="318" y="112" width="520" height="310" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="578" y="150" fill="#d29922" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Shell Runtime Boundary</text>
  <rect x="348" y="180" width="200" height="88" rx="6" fill="#0d1117" stroke="#79c0ff"/>
  <text x="448" y="216" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Boot / Desktop / Secret</text>
  <text x="448" y="240" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">DI-003 reducer phase state</text>
  <rect x="576" y="180" width="232" height="88" rx="6" fill="#0d1117" stroke="#79c0ff"/>
  <text x="692" y="216" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Window Manager</text>
  <text x="692" y="240" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">focus, z-index, size, position</text>
  <rect x="348" y="292" width="460" height="98" rx="6" fill="#0d1117" stroke="#79c0ff"/>
  <text x="578" y="330" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">App Registry + Asset/Text Contracts</text>
  <text x="578" y="354" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">launcher labels, delivery filenames, fallback behavior, window defaults</text>

  <rect x="918" y="112" width="634" height="470" rx="8" fill="#161b22" stroke="#f78166" stroke-width="2"/>
  <text x="1235" y="150" fill="#f78166" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Bundled App Modules</text>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="952" y="184" width="252" height="110" rx="6" fill="#0d1117" stroke="#f78166"/>
    <text x="1078" y="222" fill="#f78166" font-size="20" font-weight="700">Notepad</text>
    <text x="1078" y="246" fill="#c9d1d9" font-size="13">native textarea</text>
    <text x="1078" y="266" fill="#c9d1d9" font-size="13">typing / clear / replace</text>

    <rect x="1268" y="184" width="252" height="110" rx="6" fill="#0d1117" stroke="#f78166"/>
    <text x="1394" y="222" fill="#f78166" font-size="20" font-weight="700">Paint</text>
    <text x="1394" y="246" fill="#c9d1d9" font-size="13">Canvas 2D + Pointer Events</text>
    <text x="1394" y="266" fill="#c9d1d9" font-size="13">pencil / eraser / palette</text>

    <rect x="952" y="326" width="252" height="110" rx="6" fill="#0d1117" stroke="#f78166"/>
    <text x="1078" y="364" fill="#f78166" font-size="20" font-weight="700">Calculator</text>
    <text x="1078" y="388" fill="#c9d1d9" font-size="13">local arithmetic state</text>
    <text x="1078" y="408" fill="#c9d1d9" font-size="13">keypad + display</text>

    <rect x="1268" y="326" width="252" height="110" rx="6" fill="#0d1117" stroke="#f78166"/>
    <text x="1394" y="364" fill="#f78166" font-size="20" font-weight="700">Minesweeper</text>
    <text x="1394" y="388" fill="#c9d1d9" font-size="13">deterministic engine</text>
    <text x="1394" y="408" fill="#c9d1d9" font-size="13">counter / flag mode / restart</text>

    <rect x="1080" y="470" width="314" height="82" rx="6" fill="#0d1117" stroke="#f78166"/>
    <text x="1237" y="504" fill="#f78166" font-size="18" font-weight="700">Shared WindowFrame + DesktopSurface</text>
    <text x="1237" y="528" fill="#c9d1d9" font-size="13">launcher grid, shell chrome, responsive window presentation</text>
  </g>

  <rect x="318" y="474" width="520" height="186" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="578" y="512" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Static Inputs</text>
  <rect x="348" y="542" width="208" height="86" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="452" y="576" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">8-TEXT-CONTENT</text>
  <text x="452" y="600" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">Writer-owned labels and assistive strings</text>
  <rect x="600" y="542" width="208" height="86" rx="6" fill="#0d1117" stroke="#d29922"/>
  <text x="704" y="576" fill="#d29922" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">9 Graphic Assets</text>
  <text x="704" y="600" fill="#c9d1d9" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle">boot mark, wallpaper, icons, diagrams</text>

  <rect x="318" y="718" width="1234" height="184" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
  <text x="935" y="756" fill="#79c0ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Browser Platform APIs / Runtime Output</text>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="352" y="786" width="214" height="82" rx="6" fill="#0d1117" stroke="#79c0ff"/>
    <text x="459" y="820" fill="#79c0ff" font-size="18" font-weight="700">DOM + CSS Layout</text>
    <text x="459" y="844" fill="#c9d1d9" font-size="13">responsive shell and retro chrome</text>
    <rect x="596" y="786" width="214" height="82" rx="6" fill="#0d1117" stroke="#79c0ff"/>
    <text x="703" y="820" fill="#79c0ff" font-size="18" font-weight="700">Canvas 2D</text>
    <text x="703" y="844" fill="#c9d1d9" font-size="13">Paint bitmap strokes</text>
    <rect x="840" y="786" width="214" height="82" rx="6" fill="#0d1117" stroke="#79c0ff"/>
    <text x="947" y="820" fill="#79c0ff" font-size="18" font-weight="700">Pointer / Keyboard Events</text>
    <text x="947" y="844" fill="#c9d1d9" font-size="13">desktop, touch, accessibility inputs</text>
    <rect x="1084" y="786" width="214" height="82" rx="6" fill="#0d1117" stroke="#79c0ff"/>
    <text x="1191" y="820" fill="#79c0ff" font-size="18" font-weight="700">Timers + Focus</text>
    <text x="1191" y="844" fill="#c9d1d9" font-size="13">boot sequencing and secret dismissal</text>
    <rect x="1328" y="786" width="190" height="82" rx="6" fill="#0d1117" stroke="#79c0ff"/>
    <text x="1423" y="820" fill="#79c0ff" font-size="18" font-weight="700">Rendered Experience</text>
    <text x="1423" y="844" fill="#c9d1d9" font-size="13">visitor sees retro desktop</text>
  </g>

  <g stroke-width="3" fill="none">
    <path d="M258 190 H318" stroke="#79c0ff"/>
    <path d="M838 228 H918" stroke="#f78166"/>
    <path d="M578 390 V474" stroke="#d29922"/>
    <path d="M704 628 V718" stroke="#d29922"/>
    <path d="M452 628 V718" stroke="#3fb950"/>
    <path d="M1237 552 V718" stroke="#f78166"/>
    <path d="M838 320 H918" stroke="#f78166"/>
  </g>
  <g fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="270" y="182">user intent</text>
    <text x="848" y="220">render requests</text>
    <text x="590" y="440">contract lookup</text>
    <text x="714" y="686">asset bytes</text>
    <text x="463" y="684">UI strings</text>
    <text x="1249" y="676">platform output</text>
  </g>
</svg>
