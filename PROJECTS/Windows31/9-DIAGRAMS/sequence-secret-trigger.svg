<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sequence diagram secret trigger</title>
  <desc id="desc">Sequence for triple-activating the Program Manager icon, opening the secret overlay, and restoring focus.</desc>
  <rect width="1600" height="900" fill="#0d1117"/>
  <text x="48" y="54" fill="#e6edf3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Sequence — Secret Trigger and Return</text>
  <text x="48" y="80" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="15">UC-006 implementation path</text>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="60" y="118" width="170" height="56" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
    <text x="145" y="152" fill="#79c0ff" font-size="22" font-weight="700">Visitor</text>
    <rect x="302" y="118" width="270" height="56" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="437" y="152" fill="#d29922" font-size="22" font-weight="700">Program Manager Icon Button</text>
    <rect x="644" y="118" width="220" height="56" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <text x="754" y="152" fill="#d29922" font-size="22" font-weight="700">Shell Reducer</text>
    <rect x="936" y="118" width="220" height="56" rx="8" fill="#161b22" stroke="#f78166" stroke-width="2"/>
    <text x="1046" y="152" fill="#f78166" font-size="22" font-weight="700">SecretOverlay</text>
    <rect x="1228" y="118" width="260" height="56" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2"/>
    <text x="1358" y="152" fill="#79c0ff" font-size="22" font-weight="700">Focused Shell Target</text>
  </g>

  <g stroke="#3d444d" stroke-dasharray="8 8">
    <path d="M145 174 V840"/><path d="M437 174 V840"/><path d="M754 174 V840"/><path d="M1046 174 V840"/><path d="M1358 174 V840"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <path d="M145 228 H437" stroke="#79c0ff" stroke-width="3"/>
    <text x="192" y="218" fill="#c9d1d9">1. activate title icon</text>

    <path d="M437 268 H437" stroke="#d29922" stroke-width="3"/>
    <text x="454" y="272" fill="#c9d1d9">2. count click/tap</text>

    <path d="M437 316 H754" stroke="#d29922" stroke-width="3"/>
    <text x="510" y="306" fill="#c9d1d9">3. on third activation within 2500ms</text>

    <path d="M754 356 H754" stroke="#d29922" stroke-width="3"/>
    <text x="774" y="360" fill="#c9d1d9">4. guard: phase=desktop, no modal open</text>

    <path d="M754 404 H1046" stroke="#d29922" stroke-width="3"/>
    <text x="816" y="394" fill="#c9d1d9">5. TRIGGER_SECRET</text>

    <path d="M1046 452 H1358" stroke="#f78166" stroke-width="3"/>
    <text x="1118" y="442" fill="#c9d1d9">6. save last focused target</text>

    <path d="M1046 500 H145" stroke="#79c0ff" stroke-width="3"/>
    <text x="584" y="490" fill="#c9d1d9">7. render modal retro window + after-hours backdrop + dismiss button</text>

    <path d="M1046 548 H1046" stroke="#f78166" stroke-width="3"/>
    <text x="1084" y="552" fill="#c9d1d9">8. trap focus inside overlay</text>

    <path d="M145 608 H1046" stroke="#79c0ff" stroke-width="3"/>
    <text x="520" y="598" fill="#c9d1d9">9. dismiss with button or Escape</text>

    <path d="M1046 656 H754" stroke="#f78166" stroke-width="3"/>
    <text x="844" y="646" fill="#c9d1d9">10. DISMISS_SECRET</text>

    <path d="M754 704 H1358" stroke="#d29922" stroke-width="3"/>
    <text x="988" y="694" fill="#c9d1d9">11. restore focus to last app title bar or desktop surface</text>

    <path d="M1358 752 H145" stroke="#79c0ff" stroke-width="3"/>
    <text x="670" y="742" fill="#c9d1d9">12. visitor returns safely to normal shell flow</text>
  </g>

  <rect x="72" y="798" width="1452" height="64" rx="8" fill="#161b22" stroke="#a78bfa"/>
  <text x="798" y="826" fill="#d2b7ff" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Key edge cases from DI-004: ignore trigger during boot, do not trigger from text-entry focus, keep sequence idempotent, and always restore a valid focus target.</text>
  <text x="798" y="848" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle">Secret behavior stays optional, visible, and recoverable.</text>
</svg>
