server {
    listen 80;
    server_name boiler.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name boiler.example.com;

    ssl_certificate     /etc/letsencrypt/live/boiler.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boiler.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    root /var/www/boiler/current;
    index index.html;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # The Boiler Room ships as a single self-contained index.html with an inline
    # <script> and inline <style>. 'unsafe-inline' is required for that one bundle.
    # connect-src 'self' covers the optional same-origin metrics agent; the static
    # deploy runs in demo mode when no agent is reachable.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; frame-ancestors 'self';" always;

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|svg|woff2|png|jpg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
