<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="brass" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f5d488"/>
      <stop offset="45%" stop-color="#c8941f"/>
      <stop offset="100%" stop-color="#6b4a0a" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="dial" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1b2027"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>
  <!-- brass bezel -->
  <circle cx="160" cy="160" r="150" fill="url(#brass)" stroke="#3d2a06" stroke-width="3"/>
  <circle cx="160" cy="160" r="132" fill="#26190a"/>
  <!-- rivets -->
  <g fill="#8a6314">
    <circle cx="160" cy="22" r="6"/><circle cx="298" cy="160" r="6"/>
    <circle cx="160" cy="298" r="6"/><circle cx="22" cy="160" r="6"/>
    <circle cx="62" cy="62" r="5"/><circle cx="258" cy="62" r="5"/>
    <circle cx="258" cy="258" r="5"/><circle cx="62" cy="258" r="5"/>
  </g>
  <!-- dial face -->
  <circle cx="160" cy="160" r="120" fill="url(#dial)" stroke="#3d444d" stroke-width="2"/>
  <!-- arc zones: green / amber / red -->
  <path d="M 73 233 A 120 120 0 0 1 73 87" fill="none" stroke="#2ea043" stroke-width="10" stroke-linecap="round"/>
  <path d="M 73 87 A 120 120 0 0 1 232 76" fill="none" stroke="#d29922" stroke-width="10" stroke-linecap="round"/>
  <path d="M 232 76 A 120 120 0 0 1 247 233" fill="none" stroke="#f85149" stroke-width="10" stroke-linecap="round"/>
  <!-- ticks -->
  <g stroke="#8b949e" stroke-width="2">
    <line x1="160" y1="52" x2="160" y2="66"/>
    <line x1="160" y1="254" x2="160" y2="268"/>
    <line x1="52" y1="160" x2="66" y2="160"/>
    <line x1="254" y1="160" x2="268" y2="160"/>
  </g>
  <!-- needle (id for runtime rotation) -->
  <g id="needle" transform="rotate(40 160 160)">
    <polygon points="160,160 154,166 160,64 166,166" fill="#f78166"/>
  </g>
  <circle cx="160" cy="160" r="12" fill="#c8941f" stroke="#3d2a06" stroke-width="2"/>
  <text id="gauge-value" x="160" y="210" fill="#e6edf3" font-size="26" text-anchor="middle">42%</text>
  <text id="gauge-label" x="160" y="236" fill="#d29922" font-size="13" text-anchor="middle" letter-spacing="2">FURNACE</text>
</svg>
