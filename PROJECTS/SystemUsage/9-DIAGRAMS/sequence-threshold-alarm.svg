<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="1000" height="520" fill="#0d1117"/>
  <text x="20" y="32" fill="#d29922" font-size="18">Sequence — Threshold &amp; Alarm (UC-009 / UC-010)</text>

  <g fill="#161b22" stroke="#3d444d">
    <rect x="60" y="60" width="140" height="40" rx="6"/>
    <rect x="280" y="60" width="170" height="40" rx="6"/>
    <rect x="520" y="60" width="180" height="40" rx="6"/>
    <rect x="780" y="60" width="170" height="40" rx="6"/>
  </g>
  <text x="130" y="85" fill="#e6edf3" font-size="12" text-anchor="middle">User</text>
  <text x="365" y="85" fill="#79c0ff" font-size="12" text-anchor="middle">Alert Control</text>
  <text x="610" y="85" fill="#79c0ff" font-size="12" text-anchor="middle">evaluateAlerts</text>
  <text x="865" y="85" fill="#2ea043" font-size="12" text-anchor="middle">Lamp / Notify</text>
  <g stroke="#21262d" stroke-width="2">
    <line x1="130" y1="100" x2="130" y2="480"/>
    <line x1="365" y1="100" x2="365" y2="480"/>
    <line x1="610" y1="100" x2="610" y2="480"/>
    <line x1="865" y1="100" x2="865" y2="480"/>
  </g>

  <line x1="130" y1="140" x2="365" y2="140" stroke="#79c0ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="248" y="132" fill="#8b949e" font-size="11" text-anchor="middle">drag valve (input event)</text>
  <rect x="300" y="155" width="130" height="32" rx="6" fill="#1b2027" stroke="#d29922"/>
  <text x="365" y="176" fill="#d29922" font-size="10" text-anchor="middle">save localStorage</text>

  <line x1="365" y1="215" x2="610" y2="215" stroke="#79c0ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="488" y="207" fill="#8b949e" font-size="11" text-anchor="middle">applyZones(res) · new threshold</text>

  <line x1="610" y1="265" x2="610" y2="265" stroke="#8b949e"/>
  <rect x="560" y="250" width="220" height="40" rx="6" fill="#1b2027" stroke="#3d444d"/>
  <text x="670" y="275" fill="#e6edf3" font-size="11" text-anchor="middle">v ≥ thr ? critical : warning/normal</text>

  <line x1="610" y1="320" x2="865" y2="320" stroke="#2ea043" stroke-width="2" marker-end="url(#a)"/>
  <text x="738" y="312" fill="#8b949e" font-size="11" text-anchor="middle">set lamp + panel.alarm</text>

  <line x1="865" y1="365" x2="130" y2="365" stroke="#2ea043" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="500" y="357" fill="#8b949e" font-size="11" text-anchor="middle">desktop Notification (if granted) · valve vents + hiss</text>

  <line x1="610" y1="415" x2="865" y2="415" stroke="#8b949e" stroke-width="2" marker-end="url(#a)"/>
  <text x="738" y="407" fill="#8b949e" font-size="11" text-anchor="middle">v &lt; thr → auto-clear alarm</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
