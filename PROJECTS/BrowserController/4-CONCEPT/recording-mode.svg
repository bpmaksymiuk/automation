<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="20" y="40" font-size="24" font-weight="bold" fill="#58a6ff">
    BrowserController: Recording Mode
  </text>
  
  <!-- Main Layout: Browser Preview (left) + Step List (right) -->
  
  <!-- Left: Browser Preview Section -->
  <rect x="20" y="80" width="650" height="680" fill="#161b22" stroke="#30a46c" stroke-width="2"/>
  <text x="40" y="110" font-size="14" font-weight="bold" fill="#30a46c">Live Browser Preview</text>
  
  <!-- Browser address bar -->
  <rect x="40" y="130" width="610" height="40" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <text x="50" y="158" font-size="12" fill="#d0d0d0">https://www.example.com/search?q=ukraine</text>
  
  <!-- Browser content area -->
  <rect x="40" y="180" width="610" height="550" fill="#ffffff" stroke="#6b7280" stroke-width="1"/>
  <text x="60" y="220" font-size="14" font-weight="bold" fill="#333333">Search Results for "ukraine"</text>
  
  <!-- Mock search result items -->
  <rect x="60" y="250" width="570" height="80" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="80" y="280" font-size="12" font-weight="bold" fill="#0066cc">Ukraine receives advanced military aid</text>
  <text x="80" y="305" font-size="11" fill="#555555">NATO partners announce new support package...</text>
  <text x="80" y="325" font-size="10" fill="#999999">www.news.example.com › world › ukraine</text>
  
  <!-- Second result -->
  <rect x="60" y="350" width="570" height="80" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="80" y="380" font-size="12" font-weight="bold" fill="#0066cc">Ukraine calls for continued support</text>
  <text x="80" y="405" font-size="11" fill="#555555">President requests additional humanitarian aid...</text>
  <text x="80" y="425" font-size="10" fill="#999999">www.news.example.com › world › ukraine</text>
  
  <!-- Right: Step List Section -->
  <rect x="700" y="80" width="480" height="680" fill="#161b22" stroke="#30a46c" stroke-width="2"/>
  <text x="720" y="110" font-size="14" font-weight="bold" fill="#30a46c">Recorded Steps</text>
  
  <!-- Step items -->
  <rect x="720" y="130" width="440" height="50" fill="#0d1117" stroke="#30a46c" stroke-width="2"/>
  <circle cx="740" cy="155" r="8" fill="#30a46c"/>
  <text x="760" y="160" font-size="12" font-weight="bold" fill="#30a46c">Step 1: Open URL</text>
  <text x="760" y="175" font-size="10" fill="#999999">https://www.example.com</text>
  
  <!-- Step 2 -->
  <rect x="720" y="195" width="440" height="50" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <circle cx="740" cy="220" r="8" fill="#6b7280"/>
  <text x="760" y="225" font-size="12" fill="#d0d0d0">Step 2: Fill search box</text>
  <text x="760" y="240" font-size="10" fill="#999999">selector: input[type="search"]</text>
  
  <!-- Step 3 -->
  <rect x="720" y="260" width="440" height="50" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <circle cx="740" cy="285" r="8" fill="#6b7280"/>
  <text x="760" y="290" font-size="12" fill="#d0d0d0">Step 3: Press Enter</text>
  <text x="760" y="305" font-size="10" fill="#999999">Wait 2000ms for page load</text>
  
  <!-- Step 4 (highlighted next action) -->
  <rect x="720" y="325" width="440" height="50" fill="#0d1117" stroke="#f85149" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="740" cy="350" r="8" fill="#f85149"/>
  <text x="760" y="355" font-size="12" fill="#f85149">Next: Click on first result</text>
  <text x="760" y="370" font-size="10" fill="#999999">Waiting for user interaction...</text>
  
  <!-- Action buttons at bottom right -->
  <rect x="720" y="700" width="100" height="40" fill="#30a46c" stroke="#30a46c" stroke-width="1" rx="4"/>
  <text x="750" y="728" font-size="12" font-weight="bold" fill="#0d1117" text-anchor="middle">Done</text>
  
  <rect x="840" y="700" width="100" height="40" fill="#d29922" stroke="#d29922" stroke-width="1" rx="4"/>
  <text x="870" y="728" font-size="12" font-weight="bold" fill="#0d1117" text-anchor="middle">Cancel</text>
  
  <!-- Legend -->
  <text x="20" y="780" font-size="10" fill="#6b7280">Recording UI shows live browser on left, step capture on right. Each interaction is validated and documented.</text>
</svg>
