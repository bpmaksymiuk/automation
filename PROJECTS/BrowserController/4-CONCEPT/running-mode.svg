<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="20" y="40" font-size="24" font-weight="bold" fill="#58a6ff">
    BrowserController: Running Mode
  </text>
  
  <!-- Main Layout: Progress/Log (left) + Browser Window (right) -->
  
  <!-- Left: Execution Log -->
  <rect x="20" y="80" width="450" height="680" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="40" y="110" font-size="14" font-weight="bold" fill="#58a6ff">Execution Log</text>
  
  <!-- Log entries -->
  <rect x="40" y="130" width="410" height="35" fill="#0d1117" stroke="#30a46c" stroke-width="1"/>
  <text x="50" y="155" font-size="11" fill="#30a46c">✓ Opened https://www.example.com</text>
  
  <rect x="40" y="170" width="410" height="35" fill="#0d1117" stroke="#30a46c" stroke-width="1"/>
  <text x="50" y="195" font-size="11" fill="#30a46c">✓ Filled search box: "ukraine"</text>
  
  <rect x="40" y="210" width="410" height="35" fill="#0d1117" stroke="#30a46c" stroke-width="1"/>
  <text x="50" y="235" font-size="11" fill="#30a46c">✓ Pressed Enter, waited 2000ms</text>
  
  <rect x="40" y="250" width="410" height="35" fill="#0d1117" stroke="#d29922" stroke-width="2"/>
  <text x="50" y="275" font-size="11" fill="#d29922">⚠ Click selector not found: a.newsLink:1</text>
  
  <rect x="40" y="290" width="410" height="35" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <text x="50" y="315" font-size="11" fill="#6b7280">→ Trying alternative: a[role="button"]:1</text>
  
  <rect x="40" y="330" width="410" height="35" fill="#0d1117" stroke="#30a46c" stroke-width="1"/>
  <text x="50" y="355" font-size="11" fill="#30a46c">✓ Found and clicked using role selector</text>
  
  <rect x="40" y="370" width="410" height="35" fill="#0d1117" stroke="#30a46c" stroke-width="1"/>
  <text x="50" y="395" font-size="11" fill="#30a46c">✓ Extracted text: "Ukraine receives..."</text>
  
  <rect x="40" y="410" width="410" height="35" fill="#0d1117" stroke="#30a46c" stroke-width="1"/>
  <text x="50" y="435" font-size="11" fill="#30a46c">✓ Script corrected with new selector</text>
  
  <!-- Progress indicator -->
  <text x="40" y="470" font-size="12" font-weight="bold" fill="#58a6ff">Progress: 4 / 5 steps</text>
  <rect x="40" y="480" width="410" height="20" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <rect x="40" y="480" width="328" height="20" fill="#30a46c"/>
  <text x="225" y="495" font-size="11" fill="#0d1117" text-anchor="middle" font-weight="bold">80%</text>
  
  <!-- Stats box -->
  <rect x="40" y="520" width="410" height="120" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <text x="50" y="545" font-size="11" font-weight="bold" fill="#d0d0d0">Run Statistics</text>
  <text x="50" y="565" font-size="10" fill="#999999">Duration: 12.5s</text>
  <text x="50" y="580" font-size="10" fill="#999999">Actions: 5 completed</text>
  <text x="50" y="595" font-size="10" fill="#999999">Recoveries: 1 selector corrected</text>
  <text x="50" y="610" font-size="10" fill="#999999">Data extracted: 1 item</text>
  <text x="50" y="630" font-size="10" fill="#30a46c">Status: In Progress...</text>
  
  <!-- Right: Live Browser Window -->
  <rect x="490" y="80" width="690" height="680" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="510" y="110" font-size="14" font-weight="bold" fill="#58a6ff">Browser View (Headless: ON)</text>
  
  <!-- Browser controls -->
  <rect x="510" y="130" width="650" height="35" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <text x="520" y="155" font-size="11" fill="#d0d0d0">https://www.news.example.com/article/ukraine-military-aid</text>
  
  <!-- Article content -->
  <rect x="510" y="180" width="650" height="550" fill="#ffffff" stroke="#6b7280" stroke-width="1"/>
  
  <!-- Article headline -->
  <text x="530" y="220" font-size="16" font-weight="bold" fill="#333333">Ukraine Receives Advanced Military Aid</text>
  
  <!-- Article meta -->
  <text x="530" y="245" font-size="11" fill="#999999">Published: June 10, 2026 | By Staff Reporter</text>
  
  <!-- Article body -->
  <text x="530" y="270" font-size="12" fill="#555555">NATO partners have announced a new military assistance</text>
  <text x="530" y="290" font-size="12" fill="#555555">package for Ukraine, including advanced weapons systems</text>
  <text x="530" y="310" font-size="12" fill="#555555">and defensive equipment. The announcement comes as...</text>
  
  <!-- Highlighted extraction box -->
  <rect x="520" y="345" width="630" height="80" fill="#fffacd" stroke="#f85149" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="530" y="365" font-size="11" fill="#333333" font-weight="bold">[EXTRACTED DATA]</text>
  <text x="530" y="385" font-size="11" fill="#333333">Title: "Ukraine Receives Advanced Military Aid"</text>
  <text x="530" y="405" font-size="11" fill="#333333">Summary: "NATO partners have announced a new..."</text>
  <text x="530" y="425" font-size="10" fill="#999999">Status: Ready to save to results</text>
  
  <!-- Bottom action button -->
  <rect x="510" y="700" width="650" height="40" fill="#0d1117" stroke="#6b7280" stroke-width="1"/>
  <text x="530" y="728" font-size="11" fill="#999999">Running... Press Ctrl+C to stop. Results will be saved on completion.</text>
  
  <!-- Legend -->
  <text x="20" y="780" font-size="10" fill="#6b7280">Running mode shows execution log (left) with live browser (right). Auto-recovery highlighted with yellow box.</text>
</svg>
